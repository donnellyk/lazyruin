name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test
        env:
          EDITOR: "true"
        run: go test ./...
