name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          awk -v target="## [$VERSION]" '
            index($0, "## [") == 1 {
              if (p) exit
              if (index($0, target) == 1) { p=1; next }
            }
            p {
              if (!started && NF == 0) next
              started=1
              print
            }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
          echo "---- extracted release notes ----"
          cat "$NOTES_FILE"
          echo "---- end ----"
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes=${{ steps.notes.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
